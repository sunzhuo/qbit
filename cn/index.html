<!DOCTYPE html>
<html>
  <head>
    <title>Quantum Katas 中文版</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css"/>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
    <style>
      .sidebar .search input[type=search] {
        padding-left: 30px;
        background-position: 5px center;
        background-image: url("data:image/svg+xml,%3Csvg height='20px' width='20px' viewBox='0 0 24 24' fill='none' stroke='rgba(0, 0, 0, 0.3)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' preserveAspectRatio='xMidYMid meet' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10.5' cy='10.5' r='7.5' vector-effect='non-scaling-stroke'%3E%3C/circle%3E%3Cline x1='21' y1='21' x2='15.8' y2='15.8' vector-effect='non-scaling-stroke'%3E%3C/line%3E%3C/svg%3E");
        background-repeat: no-repeat;
      }

      mjx-container {
          text-align: left !important;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="javascript:void(0);" onclick="location.href='..' + location.hash;">English</a>
    </nav>
    <div id="app"></div>
    <script>
      function ensureQSharpGrammar() {
        if (!window.Prism || Prism.languages.qsharp) {
          return;
        }

        Prism.languages.qsharp = {
          comment: [
            {
              pattern: /\/\*[\s\S]*?\*\//,
              greedy: true,
            },
            {
              pattern: /\/\/[^\r\n]*/,
              greedy: true,
            }
          ],
          string: {
            pattern: /@?"(?:[^"\\]|\\.)*"/,
            greedy: true,
          },
          attribute: /@\w+\b/,
          keyword: /\b(?:Adjoint|Controlled|adjoint|and|apply|as|auto|body|borrow|borrowing|controlled|distribute|elif|else|fail|false|fixup|for|function|if|import|in|internal|intrinsic|invert|is|let|mutable|namespace|new|newtype|not|open|operation|or|return|self|set|struct|true|until|use|using|while|within)\b/,
          'class-name': /\b(?:BigInt|Bool|Double|Int|LittleEndian|Pauli|Qubit|Range|Result|String|Unit)\b/,
          number: /\b(?:0x[\da-f]+|\d+(?:\.\d+)?(?:e[+-]?\d+)?)\b/i,
          function: /\b[a-zA-Z_]\w*(?=\s*\()/,
          operator: /<-|->|=>|==|!=|<=|>=|\+\+|&&|\|\||\.\.\.|[+\-*\/%^=<>!&|?:]/,
          punctuation: /[{}[\];(),.:]/,
        };

        Prism.languages.qs = Prism.languages.qsharp;
      }

      function highlightQSharpBlocks() {
        ensureQSharpGrammar();

        if (!window.Prism || !Prism.languages.qsharp) {
          return;
        }

        const selectors = [
          'pre code.language-qsharp',
          'pre code.lang-qsharp',
          'pre code.language-qs',
          'pre code.lang-qs'
        ];

        document.querySelectorAll(selectors.join(',')).forEach((block) => {
          Prism.highlightElement(block);
        });
      }

      function rewriteRelativeImages(vm) {
        if (!vm.route || !vm.route.file) {
          return;
        }

        const appBase = new URL(location.pathname.replace(/[^/]*$/, ''), location.origin);
        const routeFile = vm.route.file;
        const routeParts = routeFile.split('/');
        routeParts.pop();
        const markdownDir = routeParts.length > 0 ? new URL(routeParts.join('/') + '/', appBase) : appBase;

        document.querySelectorAll('img[src]').forEach((img) => {
          const rawSrc = img.getAttribute('src');
          if (!rawSrc || !/^\.{1,2}\//.test(rawSrc)) {
            return;
          }

          img.src = new URL(rawSrc, markdownDir).toString();
        });
      }

      window.$docsify = {
        name: 'Quantum Katas 中文版',
        homepage: 'book-home.md',
        loadSidebar: true,
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
        },
        subMaxLevel: 3,
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: '搜索',
          noData: '找不到结果',
          depth: 6
        },
        sidebarDisplayLevel: 0,
        latex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$']],
        },
        scrollToTop: {
          auto: true,
          text: '↑',
          right: 15,
          bottom: 15,
          offset: 500
        },
        plugins: [
          function(hook, vm) {
            hook.doneEach(function() {
              document.body.scrollTop = 0;
              document.documentElement.scrollTop = 0;
              rewriteRelativeImages(vm);
              highlightQSharpBlocks();
            });
          }
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
  </body>
</html>
